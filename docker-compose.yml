services:

  postgres:
    image: postgres:16
    container_name: vigil_postgres

    restart: always

    environment:
      POSTGRES_DB: vigil
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: vigil123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend

    container_name: vigil_backend

    restart: always

    ports:
      - "8000:8000"

    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER}

    depends_on:
      - postgres

volumes:
  postgres_data: